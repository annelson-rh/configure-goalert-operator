apiVersion: v1
kind: Template
metadata:
  name: selectorsyncset-template

parameters:
  - name: PKO_IMAGE
    required: true
  - name: OPERATOR_IMAGE
    required: true
  - name: IMAGE_DIGEST
    required: true
  - name: NAMESPACE
    value: configure-goalert-operator
  - name: REPO_NAME
    value: configure-goalert-operator
    required: true
  - name: REGISTRY_IMG
    required: true
  - name:  GOALERT_ENDPOINT_URL
    required: true
  - name: SERVICE_PREFIX
    required: true
  - name: LOW_ESCALATION_POLICY
    required: true
  - name: HIGH_ESCALATION_POLICY
    required: true
  - name: GOALERT_VPCE_SERVICE_NAME_EAST
    required: true
  - name: GOALERT_VPCE_SERVICE_NAME_WEST
    required: true
  - name: GOALERT_DOMAIN
    required: true 
  - name: GOALERT_HOSTNAME
    required: true 
  - name: SCALE_TEST_LEGALENTITY_IDS
    value: '["None"]'
  - name: SILENT_ALERT_LEGALENTITY_IDS
    value: '["None"]'
  - name: CHANNEL
    value: staging
  - name: IMAGE_TAG
    value: latest
  - name: REPO_DIGEST
    required: true
  - name: FEDRAMP
    value: "true"
    
objects:
  - apiVersion: package-operator.run/v1alpha1
    kind: ClusterPackage
    metadata:
      name: "${REPO_NAME}"
      annotations:
        package-operator.run/collision-protection: IfNoController
    spec:
      image: ${PKO_IMAGE}:${IMAGE_TAG}
      config:
        image: ${OPERATOR_IMAGE}:${IMAGE_TAG}
  - apiVersion: goalert.managed.openshift.io/v1alpha1
    kind: GoalertIntegration
    metadata:
      name: osd
      namespace: configure-goalert-operator
    spec:
      lowEscalationPolicy: ${{LOW_ESCALATION_POLICY}}
      highEscalationPolicy: ${{HIGH_ESCALATION_POLICY}}
      servicePrefix: ${{SERVICE_PREFIX}}
      goalertCredsSecretRef:
        name: goalert-creds
        namespace: configure-goalert-operator
      clusterDeploymentSelector:
        matchExpressions:
        # only create Goalert service for managed (OSD) clusters
        - key: api.openshift.com/managed
          operator: In
          values: ["true"]
        # ignore CD if its a scale test organization
        - key: api.openshift.com/legal-entity-id
          operator: NotIn
          values: ${{SCALE_TEST_LEGALENTITY_IDS}}
        # ignore CD for alerts we wish to silence
        - key: api.openshift.com/legal-entity-id
          operator: NotIn
          values: ${{SILENT_ALERT_LEGALENTITY_IDS}}
        # ignore CD for any "nightly" clusters
        - key: api.openshift.com/channel-group
          operator: NotIn
          values: ["nightly"]
        # ignore CD w/ "legacy" noalerts label
        - key: api.openshift.com/noalerts
          operator: NotIn
          values: ["true"]
        # ignore CD w/ ext noalerts label
        - key: ext-managed.openshift.io/noalerts
          operator: NotIn
          values: ["true"]
      targetSecretRef:
        name: goalert-secret
        namespace: openshift-monitoring
  - apiVersion: hive.openshift.io/v1
    kind: SelectorSyncSet
    metadata:
      name: sss-goalert-vpce-east
    spec:
      clusterDeploymentSelector:
        matchExpressions:
        - key: api.openshift.com/fedramp
          operator: In
          values:
          - "true"
        - key: hive.openshift.io/cluster-region
          operator: In
          values:
          - us-gov-east-1
        - key: api.openshift.com/private-link
          operator: In
          values:
          - "true"
        matchLabels:
          api.openshift.com/managed: "true"
      resourceApplyMode: Sync
      resources:
      - apiVersion: avo.openshift.io/v1alpha2
        kind: VpcEndpoint
        metadata:
          name: goalert
          namespace: openshift-monitoring
        spec:
          serviceName: ${GOALERT_VPCE_SERVICE_NAME_EAST}
          securityGroup:
            useVpcCidr: true
            ingressRules:
              - fromPort: 443
                toPort: 443
                protocol: tcp
          vpc:
            autoDiscoverSubnets: true
          customDns:
            route53PrivateHostedZone:
              autoDiscoverPrivateHostedZone: false
              domainName: ${GOALERT_DOMAIN}
              record:
                hostname: ${GOALERT_HOSTNAME}
                externalNameService:
                  name: goalert-vpce-svc
  - apiVersion: hive.openshift.io/v1
    kind: SelectorSyncSet
    metadata:
      name: sss-goalert-vpce-west
    spec:
      clusterDeploymentSelector:
        matchExpressions:
        - key: api.openshift.com/fedramp
          operator: In
          values:
          - "true"
        - key: hive.openshift.io/cluster-region
          operator: In
          values:
          - us-gov-west-1
        - key: api.openshift.com/private-link
          operator: In
          values:
          - "true"
        - key: appsre-prod
          operator: NotIn
          values:
          - "true"        
        matchLabels:
          api.openshift.com/managed: "true"
      resourceApplyMode: Sync
      resources:
      - apiVersion: avo.openshift.io/v1alpha2
        kind: VpcEndpoint
        metadata:
          name: goalert
          namespace: openshift-monitoring
        spec:
          serviceName: ${GOALERT_VPCE_SERVICE_NAME_WEST}
          securityGroup:
            useVpcCidr: true
            ingressRules:
              - fromPort: 443
                toPort: 443
                protocol: tcp
          vpc:
            autoDiscoverSubnets: true
          customDns:
            route53PrivateHostedZone:
              autoDiscoverPrivateHostedZone: false
              domainName: ${GOALERT_DOMAIN}
              record:
                hostname: ${GOALERT_HOSTNAME}
                externalNameService:
                  name: goalert-vpce-svc
  - apiVersion: hive.openshift.io/v1
    kind: SelectorSyncSet
    metadata:
      name: sss-fleet-avo-config
    spec:
      clusterDeploymentSelector:
        matchExpressions:
          - key: api.openshift.com/fedramp
            operator: In
            values:
            - "true"
          - key: api.openshift.com/private-link
            operator: In
            values:
            - "true"
          - key: ext-hypershift.openshift.io/cluster-type
            operator: NotIn
            values:
              - "management-cluster"
          - key: app-interface-managed
            operator: NotIn
            values: ["true"]
      resourceApplyMode: Sync
      applyBehavior: CreateOrUpdate
      resources:
        - kind: ConfigMap
          apiVersion: v1
          metadata:
            name: avo-config
            namespace: openshift-aws-vpce-operator
          data:
            avo_config.yaml: |-
              apiVersion: avo.openshift.io/v1alpha1
              kind: AvoConfig
              enableVpcEndpointController: true
