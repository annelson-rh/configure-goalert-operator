---
# This Job cleans up old OLM resources after migrating to PKO
# IMPORTANT: Review and customize this template before deploying!
# 
# Things to customize:
# 1. Adjust the namespace if needed
# 2. Modify resource filters (CSV names, labels, etc.)
# 3. Review RBAC permissions
# 4. Update the cleanup logic for your specific operator
#
apiVersion: v1
kind: ServiceAccount
metadata:
  name: olm-cleanup
  namespace: configure-goalert-operator
  annotations:
    package-operator.run/phase: cleanup-rbac
    package-operator.run/collision-protection: IfNoController
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: olm-cleanup
  namespace: configure-goalert-operator
  annotations:
    package-operator.run/phase: cleanup-rbac
    package-operator.run/collision-protection: IfNoController
rules:
  # CUSTOMIZE: Adjust permissions as needed for your cleanup tasks
  - apiGroups:
      - operators.coreos.com
    resources:
      - clusterserviceversions
      - subscriptions
      - operatorgroup
      - CatalogSource
    verbs:
      - list
      - get
      - watch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: olm-cleanup
  namespace: configure-goalert-operator
  annotations:
    package-operator.run/phase: cleanup-rbac
    package-operator.run/collision-protection: IfNoController
roleRef:
  kind: Role
  name: olm-cleanup
  apiGroup: rbac.authorization.k8s.io
subjects:
  - kind: ServiceAccount
    name: olm-cleanup
    namespace: configure-goalert-operator
---
apiVersion: batch/v1
kind: Job
metadata:
  name: olm-cleanup
  namespace: configure-goalert-operator
  annotations:
    package-operator.run/phase: cleanup-deploy
    package-operator.run/collision-protection: IfNoController
spec:
  template:
    metadata:
      annotations:
        openshift.io/required-scc: restricted-v2
    spec:
      serviceAccountName: olm-cleanup
      priorityClassName: openshift-user-critical
      restartPolicy: Never
      containers:
        - name: delete-csv
          image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - |
              #!/bin/sh
              set -euxo pipefail
              # CUSTOMIZE: Update the label selector for your operator
              # Example pattern: operators.coreos.com/OPERATOR_NAME.NAMESPACE
              oc -n configure-goalert-operator delete csv -l "operators.coreos.com/configure-goalert-operator.configure-goalert-operator" || true
              
              # CUSTOMIZE: Add any additional cleanup logic here

              # - Delete subscriptions
              oc -n configure-goalert-operator delete Subscription configure-goalert-operator || true
              # - Delete operator groups
              oc -n configure-goalert-operator delete operatorgroup configure-goalert-operator-og  || true
              # - Clean up CatalogSource
              oc -n configure-goalert-operator delete CatalogSource configure-goalert-operator-catalog || true
              
              
          resources:
            requests:
              cpu: 100m
              memory: 100Mi
